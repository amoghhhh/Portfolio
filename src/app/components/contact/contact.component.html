<section class="contact-section">
  <div class="container">
    <h2 class="section-title">Let's Connect</h2>
    <p class="section-subtitle">I'd love to hear from you! Drop me a message.</p>
    
    <div class="contact-wrapper">
      <div class="form-container">
        <form #contactForm="ngForm" class="contact-form" (ngSubmit)="onSubmit(contactForm)" novalidate>
          <div class="form-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" placeholder="John Doe" required ngModel name="name" #name="ngModel">
            <div *ngIf="name.invalid && name.touched" class="error-msg">Name is required</div>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="john@example.com" required ngModel name="email" #email="ngModel">
            <div *ngIf="email.invalid && email.touched" class="error-msg">Valid email is required</div>
          </div>

          <div class="form-group">
            <label for="message">Your Message</label>
            <textarea id="message" rows="5" placeholder="Tell me about your project..." required ngModel name="message" #message="ngModel"></textarea>
            <div *ngIf="message.invalid && message.touched" class="error-msg">Message is required</div>
          </div>

          <button type="submit" class="submit-btn" [disabled]="contactForm.invalid || isSubmitting">
            <span>{{ isSubmitting ? 'Sending...' : 'Send Message' }}</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
          </button>
        </form>
      </div>

  <!-- Custom Alert -->
  <div class="custom-alert" *ngIf="showAlert" [class.success]="alertType === 'success'" [class.error]="alertType === 'error'">
    <div class="alert-content">
      <svg *ngIf="alertType === 'success'" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      <svg *ngIf="alertType === 'error'" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <p>{{ alertMessage }}</p>
      <button class="close-btn" (click)="closeAlert()">×</button>
    </div>
  </div>
</section>
